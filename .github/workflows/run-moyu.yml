name: ZNDS精准摸鱼(9分钟运行+9分10秒循环)
on:
  workflow_dispatch:  # 仅手动启动

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 350  # 5小时50分自动续命
    env:
      ZNDS_COOKIE: ${{ secrets.ZNDS_COOKIE }}
    steps:
      - uses: actions/checkout@v4

      - name: 设置Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 缓存浏览器依赖
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.cache/puppeteer
          key: ${{ runner.os }}-puppeteer

      - name: 安装依赖
        run: npm install puppeteer

      - name: 启动永久循环
        run: node moyu.js
