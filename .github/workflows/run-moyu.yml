name: ZNDS摸鱼(9分钟一轮+缓存)
on:
  workflow_dispatch:
  schedule:
    - cron: '*/9 * * * *'

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      ZNDS_COOKIE: ${{ secrets.ZNDS_COOKIE }}
    steps:
      - uses: actions/checkout@v4

      - name: 设置Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 缓存 Puppeteer
        id: cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.cache/puppeteer
          key: ${{ runner.os }}-puppeteer

      - name: 安装依赖（仅第一次）
        if: steps.cache.outputs.cache-hit != 'true'
        run: npm install puppeteer

      - name: 执行摸鱼
        run: node moyu.js
