name: ZNDS摸鱼（每9分钟自动一轮）
on:
  workflow_dispatch:
  schedule:
    - cron: '*/9 * * * *'  # 每 9 分钟执行一次

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 1
    env:
      ZNDS_COOKIE: ${{ secrets.ZNDS_COOKIE }}
    steps:
      - uses: actions/checkout@v4
      - name: 运行摸鱼（纯接口，超快）
        run: node moyu.js
