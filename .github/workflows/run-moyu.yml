name: ZNDS定时四点批量摸鱼-39轮间隔2秒
on:
  workflow_dispatch: # 保留手动运行
  schedule:
    # 北京时间转UTC(-8小时)：每日 3:25 / 9:25 / 15:25 / 21:25
    - cron: '25 19 * * *'
    - cron: '25 1 * * *'
    - cron: '25 7 * * *'
    - cron: '25 13 * * *'

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      ZNDS_COOKIE: ${{ secrets.ZNDS_COOKIE }}
    steps:
      - uses: actions/checkout@v4

      - name: 配置 Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 永久缓存浏览器+依赖，不再重复安装
      - name: 读取Puppeteer缓存
        id: cache-znds
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.cache/puppeteer
          key: ${{ runner.os }}-znds-puppeteer-cache-v2

      - name: 首次自动补装依赖
        if: steps.cache-znds.outputs.cache-hit != 'true'
        run: npm install puppeteer

      - name: 启动39轮连续自动摸鱼
        run: node moyu.js

