name: ZNDS定时摸鱼-修复准时触发版
on:
  workflow_dispatch:
  schedule:
    - cron: '25 1 * * *'
    - cron: '25 7 * * *'
    - cron: '25 13 * * *'
    - cron: '25 19 * * *'

# 关键加固：防止仓库休眠、定时被屏蔽
permissions:
  actions: write
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      ZNDS_COOKIE: ${{ secrets.ZNDS_COOKIE }}
    steps:
      - uses: actions/checkout@v4

      - name: 配置 Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 读取Puppeteer缓存
        id: cache-znds
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.cache/puppeteer
          key: ${{ runner.os }}-znds-puppeteer-cache-v2

      - name: 首次自动补装依赖
        if: steps.cache-znds.outputs.cache-hit != 'true'
        run: npm install puppeteer

      - name: 启动39轮连续自动摸鱼
        run: node moyu.js

