name: ZNDS定时摸鱼-每日6轮整点触发
on:
  workflow_dispatch:
  schedule:
    # 北京时间 1/5/9/13/17/21 整点自动执行
    - cron: '0 17 * * *'
    - cron: '0 21 * * *'
    - cron: '0 1 * * *'
    - cron: '0 5 * * *'
    - cron: '0 9 * * *'
    - cron: '0 13 * * *'

permissions:
  actions: write
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      ZNDS_COOKIE: ${{ secrets.ZNDS_COOKIE }}
    steps:
      - uses: actions/checkout@v4

      - name: 配置 Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 读取Puppeteer浏览器缓存
        id: cache-znds
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.cache/puppeteer
          key: ${{ runner.os }}-znds-puppeteer-cache-v2

      - name: 仅初次安装依赖，后续秒启动
        if: steps.cache-znds.outputs.cache-hit != 'true'
        run: npm install puppeteer

      - name: 执行39轮批量摸鱼任务
        run: node moyu.js

